<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title></title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #1a1a2e;
      font-family: 'Segoe UI', sans-serif;
      min-height: 100vh;
    }
    nav {
      background: #16213e;
      border-bottom: 1px solid #334155;
      display: flex;
      gap: 8px;
      padding: 0 24px;
    }
    nav a {
      color: #94a3b8;
      text-decoration: none;
      padding: 18px 20px;
      font-size: 0.95rem;
      font-weight: 500;
      letter-spacing: 0.04em;
      border-bottom: 3px solid transparent;
      transition: color 0.2s, border-color 0.2s;
    }
    nav a:hover { color: #e2e8f0; }
    nav a.active {
      color: #6366f1;
      border-bottom-color: #6366f1;
    }
    .section { display: none; padding: 48px 32px; }
    .section.active { display: block; }
  </style>
</head>
<body>
  <nav>
    <a href="#" class="active" onclick="show('message', this)">Message</a>
    <a href="#" onclick="show('timeline', this)">Timeline</a>
  </nav>

  <div id="message" class="section active"></div>
  <div id="timeline" class="section"></div>

  <script>
    function show(id, el) {
      document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
      document.querySelectorAll('nav a').forEach(a => a.classList.remove('active'));
      document.getElementById(id).classList.add('active');
      el.classList.add('active');
      event.preventDefault();
    }
  </script>
</body>
</html>
